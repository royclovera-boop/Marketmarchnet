<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasel Susun Gambar - Geser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #f0f0f0;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        .game-container {
            position: relative;
            border: 5px solid #333;
            background-color: #000;
            overflow: hidden;
        }

        /* Potongan gambar dasar yang timbul */
        .tile {
            position: absolute;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            z-index: 10;
        }

        /* Potongan gambar normal - efek sedikit timbul */
        .tile:not(.empty) {
            transform: translateZ(5px);
        }

        /* Kotak kosong - 3D timbul dengan gaya gambar */
        .tile.empty {
            border: 3px solid #ffd700;
            box-shadow: 
                0 0 0 4px rgba(255, 215, 0, 0.3),
                0 8px 16px rgba(0,0,0,0.4),
                inset 0 0 20px rgba(255, 215, 0, 0.2);
            z-index: 15;
            transform: translateZ(10px) scale(1.02);
            background-image: url('imgs/puzzle.png') !important;
        }

        #status {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #333;
        }

        #reset-btn {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #reset-btn:hover {
            background-color: #45a049;
        }

        /* Gaya untuk tombol transit-location */
        .transit-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .transit-btn {
            padding: 10px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #ccc;
            color: #666;
        }

        .transit-btn.active {
            background-color: #2196F3;
            color: white;
            cursor: pointer;
        }

        .transit-btn.active:hover {
            background-color: #1976D2;
        }
    </style>
</head>
<body>
    <h1>Pasel Susun Gambar</h1>
    <div class="game-container" id="game-container"></div>
    <div id="status">Silakan mulai menyusun!</div>
    <button id="reset-btn">Acak Ulang</button>
    
    <!-- Tombol Transit-Location -->
    <div class="transit-buttons">
        <button class="transit-btn" id="transit-1">level 2</button>
        <button class="transit-btn" id="transit-2">level 3</button>
        <button class="transit-btn" id="transit-3">level 4</button>
        <button class="transit-btn" id="transit-4">level 5</button>
    </div>

    <script>
        // Konfigurasi game
        const CONFIG = {
            IMAGE_PATH: 'imgs/puzzle.png', // Ganti dengan path gambar Anda
            GRID_SIZE: 3,
            TILE_SIZE: 150
        };

        let tiles = [];
        let emptyTileIndex;
        const gameContainer = document.getElementById('game-container');
        const statusText = document.getElementById('status');
        const resetBtn = document.getElementById('reset-btn');
        const transitBtns = [
            document.getElementById('transit-1'),
            document.getElementById('transit-2'),
            document.getElementById('transit-3'),
            document.getElementById('transit-4')
        ];

        // Inisialisasi game
        function initGame() {
            // Set ukuran kontainer
            gameContainer.style.width = `${CONFIG.GRID_SIZE * CONFIG.TILE_SIZE}px`;
            gameContainer.style.height = `${CONFIG.GRID_SIZE * CONFIG.TILE_SIZE}px`;

            // Buat potongan gambar
            createTiles();
            // Acak urutan potongan
            shuffleTiles();
            // Tampilkan potongan
            renderTiles();
        }

        // Buat potongan gambar berdasarkan grid
        function createTiles() {
            tiles = [];
            for (let i = 0; i < CONFIG.GRID_SIZE * CONFIG.GRID_SIZE; i++) {
                const tile = document.createElement('div');
                tile.classList.add('tile');
                tile.style.width = `${CONFIG.TILE_SIZE}px`;
                tile.style.height = `${CONFIG.TILE_SIZE}px`;
                
                // Hitung posisi pada gambar asli
                const row = Math.floor(i / CONFIG.GRID_SIZE);
                const col = i % CONFIG.GRID_SIZE;
                tile.style.backgroundImage = `url('${CONFIG.IMAGE_PATH}')`;
                tile.style.backgroundPosition = `-${col * CONFIG.TILE_SIZE}px -${row * CONFIG.TILE_SIZE}px`;
                tile.style.backgroundSize = `${CONFIG.GRID_SIZE * CONFIG.TILE_SIZE}px ${CONFIG.GRID_SIZE * CONFIG.TILE_SIZE}px`;

                // Simpan informasi posisi
                tile.dataset.actualIndex = i;
                tile.dataset.currentIndex = i;

                // Tambahkan event klik
                tile.addEventListener('click', moveTile);

                tiles.push(tile);
            }

            // Set kotak kosong
            emptyTileIndex = CONFIG.GRID_SIZE * CONFIG.GRID_SIZE - 1;
            tiles[emptyTileIndex].classList.add('empty');
        }

        // Acak urutan potongan dengan algoritma Fisher-Yates yang benar
        function shuffleTiles() {
            let currentIndex = tiles.length;
            let tempValue, randomIndex;

            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;

                // Tukar posisi saat ini
                tempValue = tiles[currentIndex].dataset.currentIndex;
                tiles[currentIndex].dataset.currentIndex = tiles[randomIndex].dataset.currentIndex;
                tiles[randomIndex].dataset.currentIndex = tempValue;
            }

            // Periksa kelayakan penyelesaian
            if (!isSolvable()) {
                // Tukar dua potongan non-kosong jika tidak bisa diselesaikan
                let tileA, tileB;
                for (let i = 0; i < tiles.length; i++) {
                    if (!tiles[i].classList.contains('empty')) {
                        tileA = tileA || i;
                        if (tileA !== i) {
                            tileB = i;
                            break;
                        }
                    }
                }
                const temp = tiles[tileA].dataset.currentIndex;
                tiles[tileA].dataset.currentIndex = tiles[tileB].dataset.currentIndex;
                tiles[tileB].dataset.currentIndex = temp;
            }
        }

        // Periksa apakah urutan bisa diselesaikan
        function isSolvable() {
            let inversionCount = 0;
            const tileValues = tiles.map(t => parseInt(t.dataset.currentIndex));
            const emptyPos = parseInt(tiles[emptyTileIndex].dataset.currentIndex);

            for (let i = 0; i < tileValues.length - 1; i++) {
                for (let j = i + 1; j < tileValues.length; j++) {
                    if (tileValues[i] > tileValues[j] && tileValues[j] !== emptyPos && tileValues[i] !== emptyPos) {
                        inversionCount++;
                    }
                }
            }

            if (CONFIG.GRID_SIZE % 2 !== 0) {
                return inversionCount % 2 === 0;
            } else {
                const emptyRow = Math.floor(emptyPos / CONFIG.GRID_SIZE);
                return (inversionCount + emptyRow) % 2 === 0;
            }
        }

        // Tampilkan potongan di posisi yang benar
        function renderTiles() {
            gameContainer.innerHTML = '';
            tiles.forEach(tile => {
                const currentIndex = parseInt(tile.dataset.currentIndex);
                const row = Math.floor(currentIndex / CONFIG.GRID_SIZE);
                const col = currentIndex % CONFIG.GRID_SIZE;
                
                tile.style.left = `${col * CONFIG.TILE_SIZE}px`;
                tile.style.top = `${row * CONFIG.TILE_SIZE}px`;
                gameContainer.appendChild(tile);
            });
        }

        // Geser potongan jika berdekatan dengan kotak kosong
        function moveTile(e) {
            const clickedTile = e.target;
            if (clickedTile.classList.contains('empty')) return;

            const clickedCurrentIndex = parseInt(clickedTile.dataset.currentIndex);
            const emptyCurrentIndex = parseInt(tiles[emptyTileIndex].dataset.currentIndex);

            const clickedRow = Math.floor(clickedCurrentIndex / CONFIG.GRID_SIZE);
            const clickedCol = clickedCurrentIndex % CONFIG.GRID_SIZE;
            const emptyRow = Math.floor(emptyCurrentIndex / CONFIG.GRID_SIZE);
            const emptyCol = emptyCurrentIndex % CONFIG.GRID_SIZE;

            const isAdjacent = 
                (clickedRow === emptyRow && Math.abs(clickedCol - emptyCol) === 1) ||
                (clickedCol === emptyCol && Math.abs(clickedRow - emptyRow) === 1);

            if (isAdjacent) {
                // Tukar posisi
                const temp = clickedTile.dataset.currentIndex;
                clickedTile.dataset.currentIndex = tiles[emptyTileIndex].dataset.currentIndex;
                tiles[emptyTileIndex].dataset.currentIndex = temp;

                renderTiles();
                checkWin();
            }
        }

        // Periksa kemenangan
        function checkWin() {
            const isWin = tiles.every(tile => parseInt(tile.dataset.currentIndex) === parseInt(tile.dataset.actualIndex));
            
            if (isWin) {
                statusText.textContent = 'Selamat! Anda berhasil menyusun gambar!';
                tiles[emptyTileIndex].classList.remove('empty');
                renderTiles();
                
                // Aktifkan tombol transit sesuai skor (setiap kemenangan +100 skor)
                updateTransitButtons();
            } else {
                statusText.textContent = 'Lanjutkan menyusun...';
            }
        }

        // Update status tombol transit
        function updateTransitButtons() {
            // Set skor berdasarkan jumlah kemenangan (setiap kemenangan = 100 skor)
            const winCount = tiles.every(t => parseInt(t.dataset.currentIndex) === parseInt(t.dataset.actualIndex)) ? 1 : 0;
            const score = (localStorage.getItem('puzzleScore') || 0) + (winCount * 100);
            localStorage.setItem('puzzleScore', score);

            transitBtns[0].classList.toggle('active', score >= 100);
            transitBtns[1].classList.toggle('active', score >= 200);
            transitBtns[2].classList.toggle('active', score >= 300);
            transitBtns[3].classList.toggle('active', score >= 400);
        }

        // Aksi tombol transit
        transitBtns.forEach((btn, idx) => {
            btn.addEventListener('click', () => {
                if (btn.classList.contains('active')) {
                    const targetPages = ['game2.html', 'game3.html', 'game4.html', 'game5.html'];
                    window.location.href = targetPages[idx];
                }
            });
        });

        // Reset game
        resetBtn.addEventListener('click', () => {
            statusText.textContent = 'Silakan mulai menyusun!';
            shuffleTiles();
            renderTiles();
        });

        // Jalankan game saat halaman dimuat
        window.addEventListener('load', () => {
            // Inisialisasi skor awal
            if (!localStorage.getItem('puzzleScore')) {
                localStorage.setItem('puzzleScore', '0');
            }
            updateTransitButtons();
            initGame();
        });
    </script>
</body>
</html>
