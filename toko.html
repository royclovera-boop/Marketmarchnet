<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLOVERA STORE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            padding: 15px 10px;
            max-width: 1400px;
            margin: 0 auto;
            color: #343a40;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header Styling */
        .store-header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 25px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .store-header .logo {
            width: 45px;
            height: 45px;
            object-fit: contain;
        }

        .store-header h1 {
            color: #2d4059;
            font-size: 2rem;
            letter-spacing: 0.5px;
        }

        .store-header p {
            font-size: 1rem;
            color: #6c757d;
            margin-top: 8px;
            text-align: center;
            grid-column: 1 / -1;
        }

        /* Gallery Layout */
        .photo-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            padding: 0 5px;
            margin-bottom: 30px;
            flex: 1;
        }

        /* Card Styling */
        .photo-card {
            background-color: white;
            border-radius: 10px;
            padding: 18px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.06);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-top: 3px solid #ff7e67;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        .photo-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 14px rgba(0, 0, 0, 0.1);
        }

        .photo-card h3 {
            color: #2d4059;
            font-size: 1.15rem;
            margin-bottom: 12px;
            font-weight: 600;
        }

        /* Image Wrapper */
        .photo-wrapper {
            width: 100%;
            height: 220px;
            border: 2px dashed #dee2e6;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            overflow: hidden;
            background-color: #fdfdfd;
            transition: border-color 0.3s ease;
            flex-shrink: 0;
        }

        .photo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .photo-wrapper .placeholder-text {
            color: #adb5bd;
            font-size: 0.9rem;
            text-align: center;
            line-height: 1.3;
            padding: 0 8px;
        }

        .photo-card:hover .photo-wrapper {
            border-color: #ff7e67;
        }

        /* Price Tag */
        .price-tag {
            font-size: 1.1rem;
            font-weight: 700;
            color: #ff7e67;
            padding: 5px 0;
            border-top: 1px solid #f1f3f5;
            margin-top: 8px;
            margin-bottom: 10px;
        }

        /* Buy Button Styling */
        .buy-btn {
            display: inline-block;
            width: 100%;
            padding: 9px 0;
            background-color: #2d4059;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: background-color 0.3s ease;
            flex-shrink: 0;
        }

        .buy-btn:hover {
            background-color: #ff7e67;
        }

        /* Social Media Section */
        .social-media {
            background-color: white;
            border-radius: 10px;
            padding: 20px 15px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.06);
            border-top: 3px solid #2d4059;
            text-align: center;
            margin-top: auto;
        }

        .social-media h4 {
            color: #2d4059;
            font-size: 1.2rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .social-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .social-link {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 6px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: opacity 0.3s ease;
        }

        .social-link:hover {
            opacity: 0.9;
        }

        /* Social Media Colors */
        .ig { background-color: #e4405f; }
        .tiktok { background-color: #000000; }
        .fb { background-color: #1877f2; }
        .shope { background-color: #ee4d2d; }
        .wa { background-color: #25d366; }
        .lynk { background-color: #2d4059; }

        /* Responsive Adjustments */
        @media (max-width: 992px) {
            .photo-gallery {
                grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
                gap: 18px;
            }
        }

        @media (max-width: 768px) {
            .store-header h1 {
                font-size: 1.7rem;
            }
            
            .photo-wrapper {
                height: 200px;
            }
        }

        @media (max-width: 480px) {
            .store-header {
                flex-direction: column;
                gap: 8px;
                padding: 15px 0;
            }

            .store-header .logo {
                width: 38px;
                height: 38px;
            }

            .store-header h1 {
                font-size: 1.5rem;
            }

            .photo-gallery {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .photo-card {
                padding: 15px;
            }

            .photo-wrapper {
                height: 180px;
            }

            .social-links {
                flex-direction: column;
                align-items: center;
            }

            .social-link {
                width: 80%;
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
    <!-- Header Section -->
    <div class="store-header">

        <h1>CLOVERA STORE</h1>

    </div>

    <!-- Social Media Section -->
    <div class="social-media">

        <div class="social-links">
            <a href="[LINK_IG]" class="social-link ig" target="_blank">Instagram</a>
            <a href="[LINK_TIKTOK]" class="social-link tiktok" target="_blank">TikTok</a>

            <a href="[LINK_SHOPE]" class="social-link shope" target="_blank">Shopee</a>
            <a href="[LINK_WA]" class="social-link wa" target="_blank">WhatsApp</a>
            <a href="https://lynk.id/roy1417" class="social-link lynk" target="_blank">Lynk Store</a>

    </div>

</body>
</html>
