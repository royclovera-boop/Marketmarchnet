<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pusat Bantuan - Chat</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';background:#0f121b;color:#fff;padding:20px;}
h2{text-align:center;color:#00ff88;}
#emailForm,#chatSection{max-width:500px;margin:0 auto 20px;background:black;border-radius:15px;padding:20px;}
#chatWindow{height:400px;overflow-y:auto;background:black;padding:15px;border-radius:15px;display:flex;flex-direction:column;gap:10px;}
.user-msg{background:#00ff88;color:black;align-self:flex-end;padding:10px;border-radius:15px;}
.admin-msg{background:#ccc;color:black;align-self:flex-start;padding:10px;border-radius:15px;}
.pending-msg{background:#ff9800;color:black;align-self:center;padding:6px;border-radius:10px;}
.typing-msg{background:#444;color:#00ff88;align-self:flex-start;padding:6px;border-radius:10px;font-style:italic;}
.chat-input{display:flex;gap:10px;margin-top:10px;}
.chat-input input{flex:1;padding:10px;border-radius:20px;border:none;}
.chat-input button{padding:10px 15px;border:none;border-radius:20px;background:#00ff88;font-weight:bold;}
#endChatBtn{margin-top:10px;width:100%;padding:10px;background:red;color:white;border:none;border-radius:20px;}
</style>
</head>
<body>

<h2>Pusat Bantuan</h2>

<div id="emailForm">
<input type="email" id="userEmailInput" placeholder="Masukkan email Anda"
style="width:70%; padding:8px; background:#111; color:white; border:1px solid #444; border-radius:5px;">
<button onclick="sendOTP()">Kirim Kode OTP</button>

<br><br>

<input type="text" id="otpInput" placeholder="Masukkan kode OTP"
style="width:70%; padding:8px; background:#111; color:white; border:1px solid #444; border-radius:5px;">
<button onclick="verifyOTP()">Verifikasi</button>
</div>

<div id="chatSection" style="display:none;">
<h3 id="chatWith"></h3>
<div id="chatWindow"></div>
<div id="typingIndicator" style="display:none;" class="typing-msg">Admin sedang mengetik...</div>
<div class="chat-input">
<input type="text" id="userMsg" placeholder="Tulis pesan...">
<button onclick="sendMsg()">Kirim</button>
</div>
<button id="endChatBtn" onclick="endChat()">Akhiri Chat</button>
</div>

<script>
emailjs.init("__EMAILJS_PUBLICKEY__");

const firebaseConfig = {
  apiKey: "__FIREBASE_APIKEY__",
  authDomain: "__FIREBASE_AUTHDOMAIN__",
  projectId: "__FIREBASE_PROJECTID__"
};

// Inisialisasi Firebase
if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();


/* =========================
   LOGIN ANONYMOUS OTOMATIS
   ========================= */
auth.signInAnonymously()
.then(()=>{
console.log("Login anonymous berhasil");
})
.catch((error)=>{
console.log("Auth error:",error);
});

let userEmail=null;
let generatedOTP=null;
let unsubscribe=null;
let unsubscribeTyping=null;

function generateOTP(){
return Math.floor(100000 + Math.random()*900000).toString();
}

async function sendOTP(){
const email=document.getElementById("userEmailInput").value.trim().toLowerCase();
if(!email){alert("Masukkan email!");return;}

const userQuery=await db.collection("users").where("email","==",email).get();
if(userQuery.empty){alert("Email tidak terdaftar.");return;}

generatedOTP=generateOTP();
userEmail=email;

console.log("OTP Generated:", generatedOTP);

emailjs.send("__EMAILJS_SERVICEID__","__EMAILJS_TEMPLATEID__",{
to_email:userEmail,
name:userEmail,
email:userEmail,
message:generatedOTP
})
.then(function(response){
alert("Kode OTP berhasil dikirim!");
console.log("SUCCESS", response);
})
.catch(function(error){
alert("Gagal kirim OTP!");
console.log("FAILED", error);
});
}

function verifyOTP(){
if(!generatedOTP){
alert("Silakan kirim OTP dulu!");
return;
}

const inputOTP=document.getElementById("otpInput").value.trim();

if(inputOTP!==generatedOTP){
alert("Kode OTP salah!");
return;
}

startChat();
}

function startChat(){
document.getElementById("emailForm").style.display="none";
document.getElementById("chatSection").style.display="block";
document.getElementById("chatWith").innerText="Chat dengan Admin ("+userEmail+")";

db.collection("tempChat").doc(userEmail).set({
active:true,
createdAt:Date.now()
},{merge:true});

unsubscribe=db.collection("tempChat")
.doc(userEmail)
.collection("messages")
.orderBy("timestamp")
.onSnapshot(snapshot=>{
const chatWindow=document.getElementById("chatWindow");
chatWindow.innerHTML="";
snapshot.forEach(doc=>{
const data=doc.data();
const div=document.createElement("div");
div.textContent=data.message;
div.className=data.sender==="user"?"user-msg":"admin-msg";
chatWindow.appendChild(div);
});
chatWindow.scrollTop=chatWindow.scrollHeight;
});

unsubscribeTyping=db.collection("tempChat")
.doc(userEmail)
.onSnapshot(doc=>{
const data=doc.data();
if(data && data.adminTyping){
document.getElementById("typingIndicator").style.display="block";
}else{
document.getElementById("typingIndicator").style.display="none";
}
});
}

function sendMsg(){
const input=document.getElementById("userMsg");
const msg=input.value.trim();
if(!msg||!userEmail)return;

db.collection("tempChat")
.doc(userEmail)
.collection("messages")
.add({
sender:"user",
message:msg,
timestamp:Date.now()
});

input.value="";
}

async function endChat(){
if(!userEmail)return;
if(!confirm("Akhiri percakapan?"))return;

const messages=await db.collection("tempChat").doc(userEmail).collection("messages").get();
messages.forEach(doc=>doc.ref.delete());

await db.collection("tempChat").doc(userEmail).delete();

if(unsubscribe)unsubscribe();
if(unsubscribeTyping)unsubscribeTyping();

userEmail=null;
generatedOTP=null;

document.getElementById("chatSection").style.display="none";
document.getElementById("emailForm").style.display="block";
}
</script>

</body>
   </html>
