<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
body {
    margin:0;
    font-family:Arial, sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background-size: cover;
    background-position: center;
}

.login-box{
    position: relative;
    z-index:1;
    background: rgba(0, 255, 136, 0.1); /* transparan hijau */
    padding:20px; /* dikurangi */
    border-radius:10px;
    width:280px; /* lebih compact */
    text-align:center;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(0,255,136,0.3);
}

h2{
    color:black;
    font-size:18px; /* kecilkan */
    margin-bottom:15px;
}

input{
    width:100%;
    padding:6px; /* dikurangi */
    margin:6px 0;
    border:none;
    border-radius:4px;
    background: rgba(255,255,255,0.1);
    color:white;
    font-size:14px; /* lebih kecil */
}
input::placeholder { color: rgba(255,255,255,0.6); font-size:14px; }

button{
    width:90%;
    padding:8px; /* lebih kecil */
    background:black;
    color:#00ff88;
    font-weight:bold;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:14px; /* lebih kecil */
}
button:hover{opacity:0.8;}

#renewBtn{
    position: fixed;
    top: 15px;
    right: 15px;
    background: limegreen;
    color: black;
    border: none;
    padding: 6px 12px; /* lebih kecil */
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    z-index: 1;
}
#renewBtn:hover{opacity:0.8;}
</style>
</head>

<body>

<button id="renewBtn" onclick="window.location.href='pay.html'">Perpanjang Akun</button>

<div class="login-box">
    <h2>LOGIN</h2>
    <input type="email" id="username" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Masuk</button>
    <br><br>
    <button onclick="window.location.href='register.html'">Register</button>
    <br><br>
    <button onclick="window.location.href='chet.html'">Pusat bantuan</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "__FIREBASE_APIKEY__",
  authDomain: "__FIREBASE_AUTHDOMAIN__",
  projectId: "__FIREBASE_PROJECTID__"
};

// Inisialisasi Firebase
if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// rankIMG untuk menentukan background
let rankIMG = "IMG/wallpaper.png";
if(rankIMG === "IMG/wallpaper.png"){
    document.body.style.backgroundImage = "url('IMG/wallpaper.png')";
}

async function login(){
    const email = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    if(!email || !password){
        alert("Email dan password harus diisi!");
        return;
    }

    try{
        const userCredential = await auth.signInWithEmailAndPassword(email,password);
        const user = userCredential.user;
        const doc = await db.collection("users").doc(user.uid).get();

        if(!doc.exists){
            alert("Data user tidak ditemukan!");
            return;
        }

        const data = doc.data();
        const now = new Date();

        if(data.expireDate && now > data.expireDate.toDate()){
            alert("Langganan Anda sudah habis!");
            window.location.href = "pay.html";
            return;
        }

        if(data.isAdmin){
            alert("Login Berhasil (Admin)!");
        } else {
            alert("Login Berhasil!");
        }

        window.location.href = "index.html";

    } catch(err){
        alert("Email atau password salah!");
        console.error(err);
    }
}
</script>

</body>
</html>
